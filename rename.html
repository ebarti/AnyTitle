<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Rename Tab</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --fg: #15141a;
        --muted: #5b5b66;
        --border: #cfcfd8;
        --field-bg: #ffffff;
        --accent: #0a84ff;
        --accent-hover: #0060df;
        --hover-overlay: rgba(0, 0, 0, 0.06);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1c1b22;
          --fg: #fbfbfe;
          --muted: #b1b1bd;
          --border: #52525e;
          --field-bg: rgba(255, 255, 255, 0.05);
          --hover-overlay: rgba(255, 255, 255, 0.08);
        }
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .wrap {
        padding: 14px 16px 12px;
      }
      .label {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 4px;
      }
      .hint {
        font-size: 11px;
        color: var(--muted);
        margin-top: 6px;
      }
      input {
        width: 100%;
        padding: 7px 9px;
        box-sizing: border-box;
        font-size: 14px;
        border: 1px solid var(--border);
        border-radius: 4px;
        background: var(--field-bg);
        color: inherit;
      }
      input:focus {
        outline: 2px solid var(--accent);
        outline-offset: -1px;
        border-color: transparent;
      }
      .row {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        margin-top: 12px;
      }
      button {
        padding: 6px 14px;
        font-size: 13px;
        border: 1px solid transparent;
        border-radius: 4px;
        cursor: pointer;
        font-family: inherit;
      }
      .primary {
        background: var(--accent);
        color: #ffffff;
      }
      .primary:hover {
        background: var(--accent-hover);
      }
      .secondary {
        background: transparent;
        color: inherit;
        border-color: var(--border);
      }
      .secondary:hover {
        background: var(--hover-overlay);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="label">New tab title</div>
      <input type="text" id="title-input" autofocus />
      <div class="hint">Leave empty to reset to the page's title</div>
      <div class="row">
        <button class="secondary" id="cancel">Cancel</button>
        <button class="primary" id="ok">Rename</button>
      </div>
    </div>
    <script src="rename.js"></script>
  </body>
</html>
